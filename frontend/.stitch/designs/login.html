<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003366",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .tech-pattern {
            background-image: radial-gradient(circle at 2px 2px, #00336615 1px, transparent 0);
            background-size: 32px 32px;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col">
<div class="flex-grow flex items-center justify-center px-4 py-12 relative overflow-hidden tech-pattern">
<!-- Abstract Decoration -->
<div class="absolute top-0 left-0 w-full h-full pointer-events-none opacity-30">
<div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-3xl"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] rounded-full bg-primary/10 blur-3xl"></div>
</div>
<!-- Login Container -->
<div class="relative z-10 w-full max-w-[480px]">
<div class="bg-white dark:bg-slate-900 shadow-xl rounded-xl border border-primary/10 overflow-hidden">
<!-- Brand Header -->
<div class="pt-10 pb-6 px-8 text-center border-b border-primary/5">
<div class="flex justify-center mb-4">
<div class="size-12 bg-primary rounded-lg flex items-center justify-center text-white">
<svg class="w-8 h-8" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_6_330)">
<path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
</g>
<defs>
<clippath id="clip0_6_330"><rect fill="white" height="48" width="48"></rect></clippath>
</defs>
</svg>
</div>
</div>
<h2 class="text-primary dark:text-slate-100 text-2xl font-bold tracking-tight">Viện Công nghệ Số</h2>
<p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Hệ thống quản lý đào tạo &amp; nghiên cứu</p>
</div>
<!-- Form Section -->
<div class="p-8">
<h1 class="text-slate-900 dark:text-slate-100 text-xl font-bold mb-6">Đăng nhập hệ thống</h1>
<form class="space-y-5">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Email công vụ</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">mail</span>
<input class="w-full pl-10 pr-4 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="account@vcs.edu.vn" type="email"/>
</div>
</div>
<div class="flex flex-col gap-2">
<div class="flex justify-between items-center">
<label class="text-slate-700 dark:text-slate-300 text-sm font-semibold">Mật khẩu</label>
<a class="text-primary dark:text-primary/80 text-xs font-semibold hover:underline" href="#">Quên mật khẩu?</a>
</div>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400">lock</span>
<input class="w-full pl-10 pr-12 py-3 rounded-lg border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-800 text-slate-900 dark:text-slate-100 focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 dark:hover:text-slate-200" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>
<div class="flex items-center gap-2 py-1">
<input class="rounded border-slate-300 text-primary focus:ring-primary h-4 w-4" id="remember" type="checkbox"/>
<label class="text-slate-600 dark:text-slate-400 text-sm" for="remember">Ghi nhớ đăng nhập</label>
</div>
<button class="w-full bg-primary text-white py-3 px-4 rounded-lg font-bold text-base hover:bg-primary/90 transition-colors shadow-lg shadow-primary/20 flex items-center justify-center gap-2" type="submit">
<span>Đăng nhập</span>
<span class="material-symbols-outlined text-[18px]">login</span>
</button>
</form>
<div class="mt-8 pt-6 border-t border-slate-100 dark:border-slate-800 text-center">
<p class="text-slate-600 dark:text-slate-400 text-sm">
                            Chưa có tài khoản? 
                            <a class="text-primary dark:text-primary/80 font-bold hover:underline" href="#">Liên hệ quản trị viên</a>
</p>
</div>
</div>
</div>
<!-- Additional Help Info -->
<div class="mt-8 grid grid-cols-2 gap-4">
<div class="bg-white/50 dark:bg-slate-900/50 p-3 rounded-lg flex items-center gap-3 border border-primary/5">
<span class="material-symbols-outlined text-primary text-[20px]">help</span>
<span class="text-xs text-slate-600 dark:text-slate-400">Hướng dẫn sử dụng</span>
</div>
<div class="bg-white/50 dark:bg-slate-900/50 p-3 rounded-lg flex items-center gap-3 border border-primary/5">
<span class="material-symbols-outlined text-primary text-[20px]">support_agent</span>
<span class="text-xs text-slate-600 dark:text-slate-400">Hỗ trợ kỹ thuật</span>
</div>
</div>
</div>
</div>
<!-- Footer -->
<footer class="py-8 px-4 text-center">
<div class="max-w-[960px] mx-auto">
<p class="text-slate-500 dark:text-slate-500 text-xs font-medium uppercase tracking-widest">
                © 2024 Viện Công nghệ Số. Bảo lưu mọi quyền.
            </p>
<div class="flex justify-center gap-6 mt-4 opacity-60">
<img alt="Vietnamese" data-alt="Vietnam flag icon small" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCYKCQe7ALxkaknR5SXGcRVUxQ7dnvk5L-I3kEi-HkpA0NpTsXbJz0da4nxBo25f8BHrTpjk91QNJNmmUhqOg3Os30iu_2HsbIztO-anP6PdT0IHkFuD96e79D6UuFacajd9Y1LR8_iwlJP3HDPpqiktkL-jHC9HpWzSaq2sf0gZh25uapsfzi0rmdHSZALc9WfcnkVQjg57szf8xUFAdPaVfOBNdfGIDqfCVz7Uy_O_P205HQT0HLT4-3fVUN9SDbw3hwVQxOIQGNy" srcset="https://flagcdn.com/w40/vn.png 2x" width="20"/>
<img alt="English" data-alt="USA flag icon small" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAo78D39xyegnIWBrIYfb0-O3PvJcPvOpJ00uelmAjXyUTPpyY175YeUWXtgp7VOGyOiONYf0Ux3WKMWOpm92VjEUH1BJw33e3PVtzyx91sBxe_tN5X2XZ4x7mNy58-c5daTDsdzxmUMOT-7aeAvJm1JIPyXOnfhIRBaPZGWDhSGPh5R1mm3SbW0_jPkhlbalJ2LKUYbQsWH4nSd4GnuKl7CgZzvPOPgvQFdtAHItru30g17Y__f10Un9sz4OUFWffNoG60NolMKmaJ" srcset="https://flagcdn.com/w40/us.png 2x" width="20"/>
</div>
</div>
</footer>
</body></html>
