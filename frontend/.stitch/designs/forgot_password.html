<!DOCTYPE html>

<html lang="vi"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#003366",
                        "background-light": "#f5f7f8",
                        "background-dark": "#0f1923",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col">
<!-- Main Content Container -->
<main class="flex-grow flex items-center justify-center px-4 py-12">
<div class="max-w-[480px] w-full flex flex-col gap-8 bg-white dark:bg-slate-900 p-8 rounded-xl shadow-sm border border-slate-200 dark:border-slate-800">
<!-- Logo and Title Section -->
<div class="flex flex-col items-center gap-6 text-center">
<div class="flex items-center gap-3 text-primary dark:text-slate-100">
<div class="size-10 flex items-center justify-center bg-primary/10 rounded-lg">
<svg class="size-6" fill="none" viewbox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
<g clip-path="url(#clip0_6_330)">
<path clip-rule="evenodd" d="M24 0.757355L47.2426 24L24 47.2426L0.757355 24L24 0.757355ZM21 35.7574V12.2426L9.24264 24L21 35.7574Z" fill="currentColor" fill-rule="evenodd"></path>
</g>
<defs>
<clippath id="clip0_6_330"><rect fill="white" height="48" width="48"></rect></clippath>
</defs>
</svg>
</div>
<h1 class="text-2xl font-bold leading-tight tracking-tight">Viện Công nghệ Số</h1>
</div>
<div class="space-y-2">
<h2 class="text-slate-900 dark:text-slate-100 text-2xl font-bold">Quên mật khẩu</h2>
<p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed">
                        Nhập email để nhận hướng dẫn khôi phục mật khẩu
                    </p>
</div>
</div>
<!-- Form Section -->
<form class="flex flex-col gap-5">
<div class="flex flex-col gap-2">
<label class="text-slate-700 dark:text-slate-300 text-sm font-medium leading-none">
                        Địa chỉ Email
                    </label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-[20px]">
                            mail
                        </span>
<input class="flex w-full rounded-lg border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 px-10 py-3 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary/50 focus:border-primary transition-all placeholder:text-slate-400" placeholder="example@email.com" required="" type="email"/>
</div>
</div>
<button class="w-full h-12 flex items-center justify-center rounded-lg bg-primary text-white text-base font-semibold transition-colors hover:bg-primary/90 focus:ring-4 focus:ring-primary/20" type="submit">
                    Gửi mã xác nhận
                </button>
</form>
<!-- Back Link -->
<div class="text-center">
<a class="inline-flex items-center gap-2 text-primary dark:text-primary/80 text-sm font-medium hover:underline" href="#">
<span class="material-symbols-outlined text-[18px]">arrow_back</span>
                    Quay lại đăng nhập
                </a>
</div>
</div>
</main>
<!-- Footer -->
<footer class="py-8 px-4 text-center">
<p class="text-slate-500 dark:text-slate-400 text-xs font-normal">
            © 2024 Viện Công nghệ Số. All rights reserved.
        </p>
</footer>
</body></html>
